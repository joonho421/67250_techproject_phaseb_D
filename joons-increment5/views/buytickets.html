<body onload="addYear()">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/MonoMuse logo.png" alt="MonoMuse logo">
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Tickets</a>
            <a href="checkout.html">Checkout</a>
            <a href="buytickets.html">Buy Tickets</a>
            <a href="javascript:void(0);" class="icon" onclick="toggleNav()">☰</a>
        </nav>

        <main class="main">
            <h2>Buy Museum Tickets</h2>

            <p>Adult: $20</p>
            <p>Student: $15</p>
            <p>Child: $10</p>

            <table>
                <tr>
                    <th>Date</th>
                    <th>Availability</th>
                    <th>Action</th>
                </tr>
                <tr>
                    <td>April 5</td>
                    <td>Available</td>
                    <td><button onclick="showPurchaseForm('April 5')">Buy Now</button></td>
                </tr>
                <tr>
                        <td>April 12</td>
                        <td>Available</td>
                        <td><button onclick="showPurchaseForm('April 12')">Buy Now</button></td>
                </tr>
                <tr>
                        <td>April 19</td>
                        <td>Available</td>
                        <td><button onclick="showPurchaseForm('April 19')">Buy Now</button></td>
                </tr>
            </table>
                <form id="purchaseForm">
                    <h3>Purchase Form</h3>

                    <label for="buyerName">Name:</label>
                    <input type="text" id="buyerName" name="buyerName">

                    <label for="buyerEmail">Email:</label>
                    <input type="email" id="buyerEmail" name="buyerEmail">

                    <label for="ticketCount">Number of Tickets:</label>
                    <input type="number" id="ticketCount" name="ticketCount" min="1">

                    <label for="selectedDate">Selected Date:</label>
                    <input type="text" id="selectedDate" name="selectedDate" readonly>

                    <button type="button" onclick="submitPurchase()">Submit</button>
                </form>

        </main>

        <figure class="main_figure"></figure>

        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
</body>
