<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Joon Ho Song">
    <meta name="keywords" content="Buy tickets, MonoMuse">
    <meta name="description" content="Buy museum tickets for MonoMuse">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonoMuse | Buy Tickets</title>

    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="../index.html" class="logo-link">
                <img id="logo" src="../static/MonoMuse logo .png" alt="MonoMuse logo">
            </a>
        </header>

        <nav class="nav_bar" id="myNav">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Tickets</a>
            <a href="checkout.html">Checkout</a>
            <a href="javascript:void(0);" class="icon" onclick="toggleNav()">☰</a>
        </nav>

        <main class="main page-card">
            <h1>Buy Museum Tickets</h1>

            <table class="ticket-table">
                <tr>
                    <th>Date</th>
                    <th>Availability</th>
                    <th>Action</th>
                </tr>
                <tr>
                    <td>April 5</td>
                    <td>Available</td>
                    <td><button type="button" onclick="showPurchaseForm('April 5')">Buy Now</button></td>
                </tr>
                <tr>
                    <td>April 12</td>
                    <td>Available</td>
                    <td><button type="button" onclick="showPurchaseForm('April 12')">Buy Now</button></td>
                </tr>
                <tr>
                    <td>April 19</td>
                    <td>Available</td>
                    <td><button type="button" onclick="showPurchaseForm('April 19')">Buy Now</button></td>
                </tr>
            </table>

            <form id="purchaseForm" class="checkout-form">
                <h2>Purchase Form</h2>

                <label for="buyerName">Name</label>
                <input type="text" id="buyerName" name="buyerName">

                <label for="buyerEmail">Email</label>
                <input type="email" id="buyerEmail" name="buyerEmail">

                <label for="ticketCount">Number of Tickets</label>
                <input type="number" id="ticketCount" name="ticketCount" min="1">

                <label for="selectedDate">Selected Date</label>
                <input type="text" id="selectedDate" name="selectedDate" readonly>

                <button type="button" onclick="submitPurchase()">Submit</button>
            </form>
        </main>

        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
</body>
</html>
